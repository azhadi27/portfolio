<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Webhook Guard | Azrulhadi Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-200 p-8">
    <div class="max-w-2xl mx-auto bg-gray-900 p-8 rounded-3xl border border-emerald-500/20 shadow-2xl">
        <h1 class="text-2xl font-bold text-white mb-2 font-mono">🛡️ Webhook Guard</h1>
        <p class="text-gray-400 text-sm mb-8">Generate a Cloudflare WAF rule to protect your marketing integrations.</p>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-mono text-emerald-500 mb-1">WEBHOOK ENDPOINT PATH</label>
                <input id="path" type="text" placeholder="/wp-json/funnelkit/v1/..." class="w-full bg-black border border-gray-800 p-3 rounded-lg focus:border-emerald-500 outline-none text-sm">
            </div>
            
            <div>
                <label class="block text-xs font-mono text-emerald-500 mb-1">TRUSTED IP (OPTIONAL)</label>
                <input id="ip" type="text" placeholder="e.g. 1.1.1.1" class="w-full bg-black border border-gray-800 p-3 rounded-lg focus:border-emerald-500 outline-none text-sm">
            </div>

            <button onclick="generateRule()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition uppercase tracking-widest text-xs">
                Generate WAF Rule
            </button>
        </div>

        <div id="resultBox" class="mt-8 hidden">
            <label class="block text-xs font-mono text-gray-500 mb-1">COPY INTO CLOUDFLARE CUSTOM RULE:</label>
            <div class="bg-black p-4 rounded-lg border border-gray-800">
                <code id="output" class="text-emerald-400 text-xs break-all"></code>
            </div>
            <p class="mt-4 text-[10px] text-gray-500 italic uppercase italic">Action: Block | Description: Prevent unauthorized access to marketing webhooks</p>
        </div>
    </div>

    <script>
        function generateRule() {
            const path = document.getElementById('path').value || '/webhook-endpoint';
            const ip = document.getElementById('ip').value;
            
            let rule = `(http.request.uri.path contains "${path}")`;
            
            if (ip) {
                rule += ` and not (ip.src eq ${ip})`;
            }
            
            rule += ` and (cf.threat_score gt 10 or ip.geoip.asnum in {12345 67890})`;

            document.getElementById('output').innerText = rule;
            document.getElementById('resultBox').classList.remove('hidden');
        }
    </script>
</body>
</html>
